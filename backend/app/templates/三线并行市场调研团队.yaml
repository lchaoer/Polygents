name: Three-Track Parallel Market Research Team
description: Parallel research on rocket, AI, and robotics markets, producing lightweight market intelligence briefs.
execution_mode: parallel
agents:
- id: rocket_researcher
  role: Rocket Market Researcher
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for lightweight rocket market research.

    Output to artifacts/rocket/market_brief.md.

    The report must include:

    1) Market size (current volume + growth overview)

    2) Major players (top companies/institutions)

    3) 3-5 key trends

    Requirements: Clear conclusions, traceable information, avoid verbosity.

    '
  tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
- id: ai_researcher
  role: AI Market Researcher
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for lightweight AI market research.

    Output to artifacts/ai/market_brief.md.

    The report must include:

    1) Market size (current volume + growth overview)

    2) Major players (model providers/platforms/application-layer representatives)

    3) 3-5 key trends

    Requirements: Clear conclusions, traceable information, avoid verbosity.

    '
  tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
- id: robotics_researcher
  role: Robotics Market Researcher
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for lightweight robotics market research.

    Output to artifacts/robotics/market_brief.md.

    The report must include:

    1) Market size (current volume + growth overview)

    2) Major players (industrial/service/humanoid representative companies)

    3) 3-5 key trends

    Requirements: Clear conclusions, traceable information, avoid verbosity.

    '
  tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
