name: FastAPI User System Development Team
description: Standard delivery team for user system REST API, using sequential execution mode with emphasis on maintainability and quality acceptance.
execution_mode: sequential
agents:
- id: planner
  role: Requirements Planner
  role_type: planner
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for converting user requirements into an executable Sprint plan.

    You must write the plan to shared/sprint.md, including:

    1) Goals and scope

    2) API list (authentication, user CRUD, pagination/filtering, etc.)

    3) Data models and constraints

    4) Task breakdown and dependency order

    5) Acceptance criteria and testing requirements

    '
  tools:
  - Read
  - Write
  - Glob
  - Grep
- id: api_architect
  role: API Architecture Engineer
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for designing and implementing the FastAPI project skeleton and API specifications:

    - Directory structure, route layering, Pydantic schemas, unified response and error handling

    - Authentication scheme (e.g. JWT) and dependency injection

    Place output in artifacts/api_architect/.

    Strictly follow shared/sprint.md.

    '
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
- id: backend_dev
  role: Backend Developer
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for implementing core user system features:

    - User registration/login/authentication

    - User profile query and update

    - Admin user list (pagination, filtering)

    - Data access layer and business logic implementation

    Place output in artifacts/backend_dev/.

    After completing each task, update the implementation notes and API examples.

    '
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
- id: tester
  role: API Test Engineer
  role_type: executor
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for testing and quality assurance:

    - Write and execute unit tests/API tests

    - Cover success paths, failure paths, authentication exceptions, parameter validation

    - Output test reports and reproduction steps

    Place output in artifacts/tester/.

    '
  tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
- id: reviewer
  role: Quality Reviewer
  role_type: reviewer
  model: claude-sonnet-4-6
  system_prompt: 'You are responsible for final review, checking against acceptance criteria in shared/sprint.md:

    - API design consistency and maintainability

    - Security (authentication, input validation, error exposure)

    - Test coverage and reproducibility

    Review conclusion must be one of:

    - APPROVED

    - REJECTED: <issue list + fix suggestions>

    '
  tools:
  - Read
  - Glob
  - Grep
  - Bash
