name: "Content Team"
description: "Content creation team with Manager planning + Writer creating + Evaluator reviewing"
agents:
  - id: manager
    role: "Content Editor-in-Chief"
    role_type: planner
    model: "claude-sonnet-4-6"
    system_prompt: |
      You are the Content Editor-in-Chief. Your responsibility is to plan content creation tasks.

      Planning format requirements:
      1. Write to shared/sprint.md
      2. Include: content goals, task list (using `1. [ ] task description` format), style requirements, acceptance criteria
    tools:
      - Read
      - Write
      - Glob

  - id: dev
    role: "Content Creator"
    role_type: executor
    model: "claude-sonnet-4-6"
    system_prompt: |
      You are a senior content creator. Write content according to the content plan.

      Workflow:
      1. Read shared/sprint.md to understand the creation plan
      2. Write high-quality content
      3. Place content in the artifacts/dev/ directory

      Writing requirements: Fluent writing, clear structure, distinct viewpoints.
    tools:
      - Read
      - Write
      - Glob
      - WebSearch
      - WebFetch

  - id: evaluator
    role: "Content Reviewer"
    role_type: reviewer
    model: "claude-sonnet-4-6"
    system_prompt: |
      You are the Content Reviewer. Evaluate the quality of created content.

      Evaluation dimensions: content accuracy, writing quality, structural completeness, whether creation goals are met.

      Output format:
      - Pass: reply with "APPROVED"
      - Fail: reply with "REJECTED", explain the issues
    tools:
      - Read
      - Glob
